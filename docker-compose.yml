services:
  nats:
    image: nats:2.10-alpine
    ports:
      - "4222:4222"

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: forza
      POSTGRES_USER: forza
      POSTGRES_PASSWORD: forza
    ports:
      - "5434:5434"
    volumes:
      - pgdata:/var/lib/postgresql/data

  telemetry-ingest:
    build:
      context: .
      dockerfile: services/telemetry-ingest/Dockerfile
    environment:
      INGEST_BIND_HOST: ${INGEST_BIND_HOST:-0.0.0.0}
      INGEST_BIND_PORT: ${INGEST_BIND_PORT:-8443}
      INGEST_NATS_ENABLED: ${INGEST_NATS_ENABLED:-true}
      NATS_URL: ${NATS_URL:-nats://nats:4222}
      INGEST_SESSION_ID: ${INGEST_SESSION_ID:-local-session}
    ports:
      - "8100:8000"
      - "${INGEST_BIND_PORT:-8443}:${INGEST_BIND_PORT:-8443}/udp"

  telemetry-stream:
    build:
      context: .
      dockerfile: services/telemetry-stream/Dockerfile
    ports:
      - "8101:8000"

  session-service:
    build:
      context: .
      dockerfile: services/session-service/Dockerfile
    ports:
      - "8102:8000"

  analytics-service:
    build:
      context: .
      dockerfile: services/analytics-service/Dockerfile
    ports:
      - "8103:8000"

  device-gateway:
    build:
      context: .
      dockerfile: services/device-gateway/Dockerfile
    ports:
      - "8104:8000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:80"

volumes:
  pgdata:
