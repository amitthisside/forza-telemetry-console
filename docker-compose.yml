services:
  nats:
    image: nats:2.10-alpine
    ports:
      - "4222:4222"

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: forza
      POSTGRES_USER: forza
      POSTGRES_PASSWORD: forza
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  telemetry-ingest:
    build: ./services/telemetry-ingest
    ports:
      - "8100:8000"
      - "5300:5300/udp"

  telemetry-stream:
    build: ./services/telemetry-stream
    ports:
      - "8101:8000"

  session-service:
    build: ./services/session-service
    ports:
      - "8102:8000"

  analytics-service:
    build: ./services/analytics-service
    ports:
      - "8103:8000"

  device-gateway:
    build: ./services/device-gateway
    ports:
      - "8104:8000"

  web:
    build: ./apps/web
    ports:
      - "3000:80"

  overlay:
    build: ./apps/overlay
    ports:
      - "3001:80"

volumes:
  pgdata:
