name: build-images

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - context: .
            dockerfile: services/telemetry-ingest/Dockerfile
            image: telemetry-ingest
          - context: .
            dockerfile: services/telemetry-stream/Dockerfile
            image: telemetry-stream
          - context: .
            dockerfile: services/session-service/Dockerfile
            image: session-service
          - context: .
            dockerfile: services/analytics-service/Dockerfile
            image: analytics-service
          - context: .
            dockerfile: services/device-gateway/Dockerfile
            image: device-gateway
          - context: .
            dockerfile: apps/web/Dockerfile
            image: web
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          tags: ghcr.io/forza-telemetry-console/${{ matrix.image }}:${{ github.sha }}
