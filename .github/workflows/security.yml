name: security

on:
  pull_request:
  push:
    branches: [main]

jobs:
  dependency-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy filesystem scan
        run: |
          docker run --rm \
            -v "${PWD}:/work" \
            aquasec/trivy:0.63.0 \
            fs --format table --exit-code 0 /work
