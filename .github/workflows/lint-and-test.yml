name: lint-and-test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - run: pnpm install
      - run: pip install ruff pytest
      - run: pip install -e packages/telemetry-models -e packages/event-contracts -e packages/forza-parser
      - run: pip install -e services/telemetry-ingest -e services/telemetry-stream -e services/session-service -e services/analytics-service -e services/device-gateway
      - run: ruff check .
      - run: pytest
      - run: pnpm -r lint
      - run: pnpm -r test
