[project]
name = "telemetry-models"
version = "0.1.0"
description = "Shared telemetry models for Forza Telemetry Console"
requires-python = ">=3.12"
dependencies = ["pydantic>=2.8,<3"]

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
